<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlwaysOn API - Offline Socket.IO & JWT Test</title>
    <!-- Completely Offline: Referencing local file so you can work without internet -->
    <script src="/socket.io.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; padding: 20px; background-color: #f4f4f9; color: #333; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; max-width: 500px;}
        input[type="text"], input[type="password"] { width: calc(100% - 22px); padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .room-controls { display: flex; gap: 10px; margin-bottom: 15px; }
        .room-controls input { margin-bottom: 0px; }
        #logs { font-family: monospace; background: #222; color: #0f0; padding: 10px; border-radius: 4px; height: 200px; overflow-y: auto; font-size: 12px; }
    </style>
</head>
<body>

    <h2>AlwaysOn - Secure Offline Development Loop</h2>
    
    <div class="card">
        <h3>1. Authentication (JWT Test)</h3>
        <p>Testing the `AuthController.java` and internal JDBC decryption.</p>
        <input type="text" id="username" value="admin" placeholder="Username">
        <input type="password" id="password" value="password123" placeholder="Password">
        <button onclick="login()">Login & Get Token</button>
        <p style="word-break: break-all; font-size: 11px; color: #666;" id="tokenDisplay">No token yet...</p>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h3>2. Socket.IO (Isolated Rooms)</h3>
        
        <div class="room-controls">
            <input type="text" id="roomInput" value="engineering" placeholder="Room Name (e.g., engineering)">
            <button onclick="joinRoom()" style="background: #28a745;">Join Room</button>
            <button onclick="leaveRoom()" style="background: #dc3545;">Leave</button>
        </div>

        <div id="logs"></div>
        <br>
        
        <div class="room-controls">
            <input type="text" id="msgInput" placeholder="Enter message to broadcast">
            <button onclick="sendMessage()">Send to Room</button>
        </div>
    </div>

    <script>
        let jwtToken = null;

        async function login() {
            const u = document.getElementById("username").value;
            const p = document.getElementById("password").value;
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                if (response.ok) {
                    const data = await response.json();
                    jwtToken = data.token;
                    document.getElementById("tokenDisplay").innerText = "Token Received: " + jwtToken;
                    logMsg("System: Logged in successfully via JWT.");
                } else {
                    logMsg("System: Login failed.");
                }
            } catch(e) { logMsg("System ERROR: " + e); }
        }

        // Connect to Socket.io Offline Backend
        const socket = io("http://localhost:8085");

        socket.on("connect", () => {
            logMsg("Socket.IO: Connected (ID: " + socket.id + ")");
            joinRoom(); // Auto-join the initial room
        });

        socket.on("chat_message", (msg) => {
            logMsg("Push Event: " + msg);
        });

        function joinRoom() {
            const r = document.getElementById("roomInput").value;
            if(!r) return;
            socket.emit("join_room", r);
            logMsg(`>>> Requesting to join [${r}]...`);
        }

        function leaveRoom() {
            const r = document.getElementById("roomInput").value;
            if(!r) return;
            socket.emit("leave_room", r);
            logMsg(`>>> Requesting to leave [${r}]...`);
        }

        function sendMessage() {
            const input = document.getElementById("msgInput").value;
            const r = document.getElementById("roomInput").value;
            if(!input || !r) return;
            
            // Format MUST mach RoomMessage.class in Backend
            socket.emit("room_message", { room: r, message: input });
            document.getElementById("msgInput").value = "";
        }

        function logMsg(string) {
            const logs = document.getElementById("logs");
            const div = document.createElement("div");
            div.innerText = "> " + string;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
        }
    </script>
</body>
</html>
