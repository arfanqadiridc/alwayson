<div class="login-wrapper">
  <div class="login-card">
    <div class="logo-box">
      <h2>AlwaysOn</h2>
      <p>Secure Enterprise WhatsApp Clone</p>
    </div>
    
    <div class="form-group">
      <input type="text" [(ngModel)]="username" placeholder="Enter username (admin)" />
    </div>
    
    <div class="form-group">
      <input type="password" [(ngModel)]="password" placeholder="Enter password (password123)" />
    </div>

    <button class="btn-login" (click)="onLogin()">Login securely</button>

    <div *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</div>
  </div>
</div>
